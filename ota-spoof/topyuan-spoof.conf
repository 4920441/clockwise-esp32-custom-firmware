# Clockwise OTA Spoof — place in /etc/nginx/conf.d/
# Intercepts requests from the ESP32 clock to www.topyuan.top
# and proxies them to the local spoof server.
#
# Install:
#   sudo cp topyuan-spoof.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo nginx -s reload
#
# Remove when done:
#   sudo rm /etc/nginx/conf.d/topyuan-spoof.conf
#   sudo nginx -s reload

server {
    listen 80;
    server_name www.topyuan.top topyuan.top;

    access_log /var/log/nginx/topyuan-spoof.log;

    # Proxy all /ledhub75/ requests to our spoof server
    location /ledhub75/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 30;
        proxy_read_timeout 300;  # firmware download can take a while
        proxy_send_timeout 300;
    }

    # Everything else (clock config JS, CSS, etc.) — return 404
    # The clock will fall back to its built-in /basic config page
    location / {
        return 404;
    }
}
